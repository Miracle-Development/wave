name: wave
description: "Peer-to-peer calls and chat application"

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.0.2

environment:
  sdk: ^3.6.2

dependencies:
  build_runner: ^2.4.15
  firebase_core: ^3.3.0
  cloud_firestore: ^5.4.4
  english_words: ^4.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_webrtc: ^1.1.0
  md_ui_kit:
    # path: ../md_ui_kit
    git:
      url: https://github.com/Miracle-Development/md_ui_kit.git
      ref: main
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  redux: ^5.0.0
  flutter_redux: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  shaders:
    - shaders/gaussian_blur.frag
    - shaders/blurred_circle.frag

  assets:
    - assets/fonts/
    - assets/icons/logo/
    - assets/icons/initial_wave/
    - assets/icons/copy/
    - assets/icons/nav_bar/

  fonts:
    - family: Play
      fonts:
        - asset: assets/fonts/Play-Regular.ttf
        - asset: assets/fonts/Play-Bold.ttf
