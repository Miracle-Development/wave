name: wave
description: "Peer-to-peer calls and chat application"

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.0.0

environment:
  sdk: ^3.6.2

dependencies:
  build_runner: ^2.4.15
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  md_ui_kit:
    git:
      url: https://github.com/Miracle-Development/md_ui_kit.git
      ref: main
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  shaders:
    - shaders/gaussian_blur.frag
    - shaders/blurred_circle.frag

  assets:
    - assets/fonts/
    - assets/icons/logo/
    - assets/icons/initial_wave/
    - assets/icons/copy/
    - assets/icons/nav_bar/

  fonts:
    - family: Play
      fonts:
        - asset: assets/fonts/Play-Regular.ttf
        - asset: assets/fonts/Play-Bold.ttf
